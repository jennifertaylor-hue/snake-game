<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Competitive Snake Game</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f0f0; }
        canvas { border: 1px solid black; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let snake = [{ x: 10, y: 10 }];
        let direction = { x: 0, y: 0 };
        let food = {};
        let gameOver = false;

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'green';
            snake.forEach(segment => ctx.fillRect(segment.x, segment.y, 10, 10));
            ctx.fillStyle = 'red';
            ctx.fillRect(food.x, food.y, 10, 10);
        }

        function update() {
            if (gameOver) return;

            const head = { x: snake[0].x + direction.x * 10, y: snake[0].y + direction.y * 10 };
            snake.unshift(head);

            // Check for collision with food
            if (head.x === food.x && head.y === food.y) {
                spawnFood();
            } else {
                snake.pop();
            }

            // Check for collision with walls or itself
            if (head.x < 0 || head.y < 0 || head.x >= canvas.width || head.y >= canvas.height || snake.slice(1).some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver = true;
            }
        }

        function spawnFood() {
            food = {
                x: Math.floor(Math.random() * (canvas.width / 10)) * 10,
                y: Math.floor(Math.random() * (canvas.height / 10)) * 10,
            };
        }

        document.addEventListener('keydown', event => {
            if (event.key === 'ArrowUp') direction = { x: 0, y: -1 };
            if (event.key === 'ArrowDown') direction = { x: 0, y: 1 };
            if (event.key === 'ArrowLeft') direction = { x: -1, y: 0 };
            if (event.key === 'ArrowRight') direction = { x: 1, y: 0 };
        });

        function gameLoop() {
            update();
            draw();
            if (!gameOver) requestAnimationFrame(gameLoop);
        }

        spawnFood();
        gameLoop();
    </script>
</body>
</html>
